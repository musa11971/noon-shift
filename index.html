<!DOCTYPE html>
<html lang="en">
<head>
    <title>Noon Shift: clock time vs. solar time</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/icon.png">

    <link href="css/maplibre-gl@5.21.1.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="map"></div>

    <div id="loading">Loading timezone data…</div>

    <div id="info-bar"></div>

    <div id="legend">
        <h4>☀️ Noon Shift</h4>
        <div class="gradient-bar"></div>
        <div class="gradient-labels">
            <span>-2 h or less</span>
            <span>0 h</span>
            <span>+2 h or more</span>
        </div>
        <div class="hint">Click anywhere to explore</div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebar-title"></h3>
            <button id="sidebar-close" aria-label="Close sidebar">&times;</button>
        </div>
        <div id="sidebar-body"></div>
        <div class="share-section">
            <div class="share-title">Share</div>
            <div class="share-buttons">
                <a class="share-btn" data-share="x" target="_blank" rel="noopener">X</a>
                <a class="share-btn" data-share="whatsapp" target="_blank" rel="noopener">WhatsApp</a>
                <button class="share-btn" id="share-copy" type="button">Copy link</button>
            </div>
        </div>
    </aside>

    <script src="js/maplibre-gl@5.21.1.js" type="text/javascript"></script>
    <script src="js/app.js" type="text/javascript"></script>
</body>
</html>
