<!DOCTYPE html>
<html lang="en">
<head>
    <title>Noon Shift: clock time vs. solar time</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/icon.png">

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100%; }

        #legend {
            position: absolute;
            bottom: 32px;
            right: 10px;
            background: rgba(255,255,255,0.92);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            z-index: 1;
            min-width: 230px;
        }
        #legend h4 { margin: 0 0 8px; font-size: 14px; font-weight: 600; }
        .gradient-bar {
            height: 12px;
            border-radius: 4px;
            background: linear-gradient(to right,
                rgb(0,220,80),
                rgb(255,255,255),
                rgb(255,20,20));
            margin-bottom: 4px;
        }
        .gradient-labels {
            display: flex;
            justify-content: space-between;
            color: #555;
            font-size: 11px;
        }
        #legend .hint {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-top: 6px;
        }

        #info-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,15,25,0.82);
            color: #fff;
            padding: 8px 18px;
            border-radius: 22px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            pointer-events: none;
            z-index: 2;
            white-space: nowrap;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        #info-bar.visible { opacity: 1; }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.92);
            border-radius: 10px;
            padding: 16px 24px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="loading">Loading timezone data…</div>

    <div id="info-bar"></div>

    <div id="legend">
        <h4>☀️ Solar vs Clock Time</h4>
        <div class="gradient-bar"></div>
        <div class="gradient-labels">
            <span>-2 h or less</span>
            <span>0 h</span>
            <span>+2 h or more</span>
        </div>
        <div class="hint">Hover a region to explore</div>
    </div>

    <script src="app.js" type="text/javascript"></script>
</body>
</html>
